# Agent Skill ownership and review manifest.
#
# Every skill under skills/ must have an entry here. The PR template for agent
# skills should require authors to add or update an entry when a skill is added
# or changed.
#
# Fields:
#   name                  string. Skill directory name (matches skills/<name>/).
#   dris                  list of 1-2 strings. Directly Responsible
#                         Individuals. Each entry is a GitHub username
#                         (no leading @). The first entry is the primary DRI;
#                         the second, if present, is the backup. DRIs own
#                         maintenance, review, and response to issues for this
#                         skill.
#   last_reviewed         string (ISO date, YYYY-MM-DD). The most recent
#                         review date. Update on any substantive change and
#                         on periodic review passes.
#   review_cadence_days   integer. Maximum days between reviews before the
#                         skill is considered stale. Default 90.
#
# Example:
#   - name: example-skill
#     dris:
#       - octocat
#       - hubot
#     last_reviewed: 2026-04-22
#     review_cadence_days: 90

skills:
  - name: couchbase-mcp-setup
    dris:
      - ejscribner
    last_reviewed: "2026-06-05"
    review_cadence_days: 90
  - name: couchbase-natural-language-querying
    dris:
      - ejscribner
