name: validate-skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skill structure
        run: |
          chmod +x tools/validate-skills.sh
          ./tools/validate-skills.sh
